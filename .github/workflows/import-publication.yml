name: Import publication request

on:
  push:
    branches: [master]
    paths:
      - 'data/publication-imports/**.yml'
      - 'content/publications/**/index.md'
  workflow_dispatch:

concurrency:
  group: publication-import-${{ github.ref }}
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Import pending requests and synchronise reviewed publications
        id: importer
        continue-on-error: true
        env:
          IEEE_API_KEY: ${{ secrets.IEEE_API_KEY }}
        run: python scripts/publication_importer.py --repo-root . --all-pending
      - name: Commit generated drafts and request statuses
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- data/publication-imports content/publications)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/publication-imports content/publications
          git commit -m "feat(publications): process metadata import request"
          git push
      - name: Report importer failure after preserving status
        if: steps.importer.outcome == 'failure'
        run: |
          echo "One or more publication requests failed; failure details were committed to the request file."
          exit 1

  dispatch:
    needs: import
    if: needs.import.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: write
    steps:
      - name: Dispatch validated site deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "${{ github.repository }}" --ref master
